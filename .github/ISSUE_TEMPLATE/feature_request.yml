name: Feature request
description: Suggest an improvement to OpenInstall.
title: "feat: "
labels: ["enhancement", "needs-triage"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or developer problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior, UI, API, or docs you want.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Native .oip package format
        - Package authoring
        - Store / repositories
        - Install UX
        - Security model
        - Build / release
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: safety
    attributes:
      label: Safety
      options:
        - label: This request does not bypass Windows security policy, consent, or package verification.
          required: true
