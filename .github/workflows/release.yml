name: release

# Build the Tauri MSI on a version tag and attach the artifact to the GitHub
# Release. Windows code signing is planned, but not yet enabled for public
# releases.
#
# Trust model note: `permissions: contents: write` is the only elevated grant,
# needed solely to create/attach the Release. Nothing here disables
# AV/SmartScreen or touches the verify-then-consent runtime path.

on:
  push:
    tags:
      - "v*"

# Default to least privilege; the release job opts into contents:write below.
permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish MSI
    runs-on: windows-latest
    permissions:
      # Required to create the GitHub Release and upload the MSI asset.
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target

      - name: Install Tauri CLI
        # Retry: `cargo install` occasionally hits transient crates.io network
        # errors (HTTP/2 framing / curl resets) that have nothing to do with us.
        shell: pwsh
        run: |
          for ($i = 1; $i -le 3; $i++) {
            cargo install tauri-cli --version "^2" --locked
            if ($LASTEXITCODE -eq 0) { exit 0 }
            Write-Warning "tauri-cli install attempt $i failed (exit $LASTEXITCODE); retrying in 15s..."
            Start-Sleep -Seconds 15
          }
          Write-Error "tauri-cli install failed after 3 attempts"
          exit 1

      - name: Install UI dependencies
        working-directory: ui
        # `npm ci` requires a committed package-lock.json. The build is
        # reproducible only when that lockfile is present.
        run: npm ci

      - name: Build Tauri MSI
        # `beforeBuildCommand` in tauri.conf.json runs the UI build.
        run: cargo tauri build --bundles msi

      # The MSI lands in the Windows bundle output directory. Stage it under a
      # stable path so later steps don't depend on the version string.
      - name: Stage unsigned MSI
        id: stage
        shell: pwsh
        run: |
          # This is a Cargo workspace, so the bundle lands in the workspace-root
          # target dir. Search both layouts to be safe.
          $paths = @(
            "target/release/bundle/msi",
            "src-tauri/target/release/bundle/msi"
          ) | Where-Object { Test-Path $_ }
          $msi = Get-ChildItem -Recurse -Filter *.msi -Path $paths |
            Select-Object -First 1
          if (-not $msi) {
            Write-Error "No .msi produced by 'cargo tauri build'."
            exit 1
          }
          New-Item -ItemType Directory -Force -Path unsigned | Out-Null
          $unsignedName = "$($msi.BaseName)-unsigned$($msi.Extension)"
          Copy-Item $msi.FullName -Destination "unsigned/$unsignedName"
          Write-Output "msi-name=$unsignedName" >> $env:GITHUB_OUTPUT
          Write-Output "Staged $unsignedName"

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v7
        with:
          name: openinstall-msi-unsigned
          path: unsigned/*.msi
          if-no-files-found: error
          retention-days: 7

      - name: Attach MSI to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: unsigned/*.msi
          fail_on_unmatched_files: true
          generate_release_notes: true
